services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: movie
      POSTGRES_PASSWORD: movie
      POSTGRES_DB: movienight
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movie -d movienight"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  pgdata:
