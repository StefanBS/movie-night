name: mobile

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile.yml"
  pull_request:
    paths:
      - "mobile/**"
      - ".github/workflows/mobile.yml"

permissions:
  contents: read

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install
        run: npm ci

      # Mirrors `just check`.
      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test
