name: backend

# No path filter: these jobs are required status checks (branch protection on
# main), so they must report on every PR. A path-filtered workflow that doesn't
# trigger leaves its required check pending forever and blocks the merge.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Format check
        run: just fmt-check

      - name: Vet
        run: just vet

      - name: Build
        run: just build

      - name: Unit tests
        run: just test

      - name: Integration tests
        run: just test-integration

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Generate SARIF (does not gate)
        run: just audit-sarif

      # Fork PRs get a read-only token and can't write security events; skip
      # upload there (the `just audit` gate below still runs on every PR).
      - name: Upload govulncheck SARIF
        if: github.event.pull_request.head.repo.fork != true
        uses: github/codeql-action/upload-sarif@84498526a009a99c875e83ef4821a8ba52de7c22 # codeql-bundle-v2.25.5
        with:
          sarif_file: backend/govulncheck.sarif
          category: govulncheck

      - name: Upload gosec SARIF
        if: github.event.pull_request.head.repo.fork != true
        uses: github/codeql-action/upload-sarif@84498526a009a99c875e83ef4821a8ba52de7c22 # codeql-bundle-v2.25.5
        with:
          sarif_file: backend/gosec.sarif
          category: gosec

      - name: Security audit (govulncheck + gosec)
        run: just audit
