# Dependabot opens dependency-update PRs that the existing CI gate + code
# scanning then vet. Updates are grouped into one PR per ecosystem per week.
#
# The npm `ignore` block protects the deliberate Expo SDK 54 pin
# (see mobile/AGENTS.md): it drops the version bumps that would move the
# SDK-coupled packages off SDK 54 — majors for the normally-versioned packages,
# and majors+minors for the two 0.x natives (react-native, react-native-web)
# where a MINOR is the breaking SDK-coupling bump. Patch updates within SDK 54
# still flow, and security-advisory updates are unaffected. Do NOT remove it.
version: 2
updates:
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    groups:
      backend:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /mobile
    schedule:
      interval: weekly
      day: monday
    groups:
      mobile:
        patterns:
          - "*"
    ignore:
      - dependency-name: expo
        update-types: ["version-update:semver-major"]
      # 0.x package: the SDK-coupling bump is a MINOR (0.81 -> 0.82), so ignore
      # minor too; patch (0.81.x) still flows within SDK 54.
      - dependency-name: react-native
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: react
        update-types: ["version-update:semver-major"]
      - dependency-name: react-dom
        update-types: ["version-update:semver-major"]
      - dependency-name: expo-constants
        update-types: ["version-update:semver-major"]
      - dependency-name: expo-status-bar
        update-types: ["version-update:semver-major"]
      - dependency-name: react-native-safe-area-context
        update-types: ["version-update:semver-major"]
      # 0.x package (same reasoning as react-native): ignore minor + major.
      - dependency-name: react-native-web
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns:
          - "*"
